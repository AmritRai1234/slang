<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slang IDE — Animation Studio</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;500;600;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #0f0f1a;
            --panel: #161625;
            --border: #2a2a3e;
            --accent: #00d4ff;
            --accent2: #7c3aed;
            --text: #e2e8f0;
            --muted: #64748b;
            --success: #22c55e;
            --error: #ef4444;
            --warning: #f59e0b;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 20px;
            background: var(--panel);
            border-bottom: 1px solid var(--border);
            height: 52px;
        }

        .header-left { display: flex; align-items: center; gap: 14px; }

        .logo {
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        .logo-sub { font-size: 12px; color: var(--muted); margin-left: 4px; }

        .header-actions { display: flex; gap: 8px; align-items: center; }

        .btn {
            padding: 7px 16px;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent), #0099cc);
            color: #000;
        }
        .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }

        .btn-download {
            background: linear-gradient(135deg, #22c55e, #16a34a);
            color: #fff;
        }
        .btn-download:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn-download:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        .btn-secondary {
            background: var(--border);
            color: var(--text);
        }
        .btn-secondary:hover { background: #3a3a5e; }

        .btn-icon {
            width: 36px; height: 36px;
            padding: 0; display: flex; align-items: center; justify-content: center;
            border-radius: 8px; font-size: 16px;
        }

        /* Main Container */
        .main {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* Editor Panel */
        .editor-panel {
            width: 50%;
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border);
        }

        .editor-toolbar {
            display: flex; align-items: center; justify-content: space-between;
            padding: 8px 16px;
            background: var(--panel);
            border-bottom: 1px solid var(--border);
        }

        .file-name {
            font-size: 13px;
            color: var(--muted);
            display: flex; align-items: center; gap: 6px;
        }
        .file-name span { color: var(--text); font-weight: 500; }

        .editor-container { flex: 1; position: relative; overflow: hidden; }

        #editor, #highlight-layer {
            width: 100%;
            height: 100%;
            padding: 20px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            line-height: 1.7;
            tab-size: 4;
            border: none;
            margin: 0;
            white-space: pre-wrap;
            word-wrap: break-word;
            overflow-y: auto;
        }

        #highlight-layer {
            position: absolute;
            top: 0; left: 0;
            pointer-events: none;
            color: transparent;
            background: var(--bg);
            z-index: 0;
        }

        #editor {
            position: relative;
            background: transparent;
            color: transparent;
            caret-color: var(--text);
            outline: none;
            resize: none;
            z-index: 1;
        }

        #editor::placeholder { color: var(--muted); }

        /* Syntax highlighting token colors */
        .hl-comment  { color: #6a9955; font-style: italic; }
        .hl-keyword  { color: #00d4ff; font-weight: 600; }
        .hl-string   { color: #ce9178; }
        .hl-number   { color: #f59e0b; }
        .hl-modifier { color: #c084fc; }
        .hl-color    { color: #f472b6; }
        .hl-plain    { color: #e2e8f0; }

        /* Autocomplete dropdown */
        .autocomplete {
            position: absolute;
            background: #1e1e2e;
            border: 1px solid var(--border);
            border-radius: 8px;
            max-height: 220px;
            overflow-y: auto;
            z-index: 50;
            min-width: 280px;
            max-width: 500px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            display: none;
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
        }
        .autocomplete.visible { display: block; }
        .ac-item {
            padding: 6px 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: background 0.1s;
        }
        .ac-item:first-child { border-radius: 8px 8px 0 0; }
        .ac-item:last-child { border-radius: 0 0 8px 8px; }
        .ac-item.selected, .ac-item:hover {
            background: rgba(0, 212, 255, 0.15);
        }
        .ac-label {
            flex: 1;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .ac-label .ac-match { color: var(--accent); font-weight: 700; }
        .ac-tag {
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: 600;
            flex-shrink: 0;
        }
        .ac-tag.keyword  { background: rgba(0,212,255,0.15); color: var(--accent); }
        .ac-tag.snippet  { background: rgba(124,58,237,0.15); color: var(--accent2); }
        .ac-tag.color    { background: rgba(244,114,182,0.15); color: #f472b6; }
        .ac-hint {
            font-size: 11px;
            color: var(--muted);
            padding: 4px 12px;
            border-top: 1px solid var(--border);
        }

        /* Preview Panel */
        .preview-panel {
            width: 50%;
            display: flex;
            flex-direction: column;
            background: #0a0a14;
        }

        .preview-toolbar {
            display: flex; align-items: center; justify-content: space-between;
            padding: 8px 16px;
            background: var(--panel);
            border-bottom: 1px solid var(--border);
        }

        .preview-stats {
            display: flex; gap: 16px;
            font-size: 12px; color: var(--muted);
        }
        .preview-stats .stat-value { color: var(--accent); font-weight: 600; }

        .preview-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        #preview-canvas {
            max-width: 100%;
            max-height: 100%;
            border-radius: 8px;
            box-shadow: 0 0 40px rgba(0, 212, 255, 0.1);
            image-rendering: auto;
        }

        .preview-placeholder {
            text-align: center;
            color: var(--muted);
        }
        .preview-placeholder .icon { font-size: 64px; margin-bottom: 16px; opacity: 0.3; }
        .preview-placeholder p { font-size: 14px; }

        /* Timeline */
        .timeline {
            padding: 10px 16px;
            background: var(--panel);
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .timeline-controls { display: flex; gap: 6px; }
        .timeline-controls button {
            width: 32px; height: 32px;
            border: none; border-radius: 6px;
            background: var(--border);
            color: var(--text);
            cursor: pointer;
            font-size: 14px;
            display: flex; align-items: center; justify-content: center;
            transition: background 0.2s;
        }
        .timeline-controls button:hover { background: #3a3a5e; }
        .timeline-controls button.active { background: var(--accent); color: #000; }

        .timeline-slider {
            flex: 1;
            -webkit-appearance: none;
            height: 6px;
            background: var(--border);
            border-radius: 3px;
            outline: none;
        }
        .timeline-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px; height: 16px;
            background: var(--accent);
            border-radius: 50%;
            cursor: pointer;
        }

        .timeline-time {
            font-size: 12px;
            font-family: 'JetBrains Mono', monospace;
            color: var(--muted);
            min-width: 100px;
            text-align: right;
        }

        /* Status Bar */
        .status-bar {
            display: flex; align-items: center; justify-content: space-between;
            padding: 4px 16px;
            background: var(--panel);
            border-top: 1px solid var(--border);
            font-size: 11px;
            color: var(--muted);
            height: 28px;
        }

        .status-indicator {
            display: inline-flex; align-items: center; gap: 5px;
        }
        .status-dot {
            width: 7px; height: 7px; border-radius: 50%;
            background: var(--success);
        }
        .status-dot.error { background: var(--error); }
        .status-dot.rendering { background: var(--warning); animation: pulse 1s infinite; }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* Loader overlay */
        .loader-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(10, 10, 20, 0.8);
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 12px;
            z-index: 10;
        }
        .loader-overlay.active { display: flex; }

        .spinner {
            width: 40px; height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .error-toast {
            position: fixed;
            bottom: 40px; right: 20px;
            background: #1e1e2e;
            border: 1px solid var(--error);
            border-radius: 10px;
            padding: 12px 20px;
            font-size: 13px;
            color: var(--error);
            display: none;
            z-index: 100;
            max-width: 400px;
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn { from { transform: translateX(100px); opacity: 0; } }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-left">
            <span class="logo">⚡ Slang IDE</span>
            <span class="logo-sub">Animation Studio</span>
        </div>
        <div class="header-actions">
            <button class="btn btn-secondary" onclick="loadExample('hello')">Hello World</button>
            <button class="btn btn-secondary" onclick="loadExample('math')">Math Demo</button>
            <button class="btn btn-secondary" onclick="loadExample('shapes')">Shapes</button>
            <button class="btn btn-secondary" onclick="loadExample('waves')">Waves</button>
            <button class="btn btn-secondary" onclick="loadExample('plotting')">Plotting</button>
            <button class="btn btn-secondary" onclick="loadExample('gradients')">Gradients</button>
            <button class="btn btn-secondary" onclick="loadExample('manim')">Manim</button>
            <button class="btn btn-primary" onclick="renderPreview()" id="render-btn">▶ Render</button>
            <button class="btn btn-download" onclick="downloadMP4()" id="download-btn">⬇ Download MP4</button>
        </div>
    </div>

    <div class="main">
        <div class="editor-panel">
            <div class="editor-toolbar">
                <div class="file-name">📄 <span>untitled.sl</span></div>
                <div style="display:flex;gap:6px;align-items:center;">
                    <span style="font-size:11px;color:var(--muted)">Ctrl+Enter to render</span>
                </div>
            </div>
            <div class="editor-container">
                <pre id="highlight-layer" aria-hidden="true"><code id="highlight-code"></code></pre>
                <textarea id="editor" spellcheck="false" placeholder="# Write your Slang code here..."></textarea>
                <div class="autocomplete" id="autocomplete"></div>
            </div>
        </div>

        <div class="preview-panel">
            <div class="preview-toolbar">
                <span style="font-size:13px;font-weight:500;">Preview</span>
                <div class="preview-stats">
                    <span>Frames: <span class="stat-value" id="stat-frames">0</span></span>
                    <span>Duration: <span class="stat-value" id="stat-duration">0s</span></span>
                    <span>Scenes: <span class="stat-value" id="stat-scenes">0</span></span>
                </div>
            </div>
            <div class="preview-container">
                <div class="loader-overlay" id="loader">
                    <div class="spinner"></div>
                    <span style="color:var(--muted);font-size:13px;">Rendering preview...</span>
                </div>
                <div class="preview-placeholder" id="placeholder">
                    <div class="icon">🎬</div>
                    <p>Click <strong>▶ Render</strong> or press <strong>Ctrl+Enter</strong></p>
                    <p style="margin-top:8px;font-size:12px;">Write Slang code on the left, see the animation here</p>
                </div>
                <img id="preview-canvas" style="display:none;" alt="Preview" />
            </div>
            <div class="timeline">
                <div class="timeline-controls">
                    <button id="play-btn" onclick="togglePlay()">▶</button>
                    <button onclick="firstFrame()">⏮</button>
                    <button onclick="lastFrame()">⏭</button>
                </div>
                <input type="range" class="timeline-slider" id="timeline" min="0" max="0" value="0"
                       oninput="seekFrame(this.value)" />
                <div class="timeline-time" id="time-display">0:00.0 / 0:00.0</div>
            </div>
        </div>
    </div>

    <div class="status-bar">
        <div class="status-indicator">
            <div class="status-dot" id="status-dot"></div>
            <span id="status-text">Ready</span>
        </div>
        <span>Slang v0.1.0 • Preview: 480p@15fps</span>
    </div>

    <div class="error-toast" id="error-toast"></div>

    <script>
        const editor = document.getElementById('editor');
        const canvas = document.getElementById('preview-canvas');
        const placeholder = document.getElementById('placeholder');
        const loader = document.getElementById('loader');
        const timeline = document.getElementById('timeline');
        const playBtn = document.getElementById('play-btn');
        const timeDisplay = document.getElementById('time-display');

        let frames = [];
        let currentFrame = 0;
        let isPlaying = false;
        let playInterval = null;
        let totalFrames = 0;
        let fps = 15;
        let renderTimeout = null;

        const highlightLayer = document.getElementById('highlight-layer');
        const highlightCode = document.getElementById('highlight-code');

        // Syntax highlighting
        const KEYWORDS = new Set([
            'scene', 'set', 'draw', 'fade', 'move', 'wait', 'write',
            'plot', 'change', 'scale', 'rotate', 'group', 'grow',
            'spin', 'spiral', 'indicate', 'wiggle', 'circumscribe',
            'flash', 'define', 'style', 'animate',
            'morph', 'zoom', 'pan', 'emit'
        ]);
        const MODIFIERS = new Set([
            'at', 'to', 'with', 'over', 'color', 'size', 'radius',
            'from', 'easing', 'in', 'out', 'the', 'a', 'an', 'of',
            'by', 'everything', 'seconds', 'second', 'thickness',
            'amplitude', 'frequency', 'math', 'background',
            'resolution', 'fps', 'x', 'into', 'count', 'particles'
        ]);
        const COLORS = new Set([
            'red', 'green', 'blue', 'yellow', 'cyan', 'magenta',
            'orange', 'pink', 'purple', 'white', 'black', 'grey',
            'gray', 'dark', 'light', 'lime', 'teal', 'coral',
            'salmon', 'gold', 'violet', 'indigo', 'crimson',
            'tomato', 'turquoise', 'aqua', 'navy', 'maroon'
        ]);

        function escapeHtml(text) {
            return text
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;');
        }

        function highlightLine(line) {
            // Comment line
            if (line.trimStart().startsWith('#')) {
                return `<span class="hl-comment">${escapeHtml(line)}</span>`;
            }

            let result = '';
            let i = 0;
            while (i < line.length) {
                // String literal
                if (line[i] === '"') {
                    let end = line.indexOf('"', i + 1);
                    if (end === -1) end = line.length - 1;
                    const str = line.slice(i, end + 1);
                    result += `<span class="hl-string">${escapeHtml(str)}</span>`;
                    i = end + 1;
                    continue;
                }
                // Whitespace
                if (/\s/.test(line[i])) {
                    result += line[i];
                    i++;
                    continue;
                }
                // Word
                const wordMatch = line.slice(i).match(/^[\w.]+/);
                if (wordMatch) {
                    const word = wordMatch[0];
                    const lower = word.toLowerCase();
                    // Number (including decimals like 1.5)
                    if (/^\d+(\.\d+)?$/.test(word)) {
                        result += `<span class="hl-number">${escapeHtml(word)}</span>`;
                    } else if (KEYWORDS.has(lower)) {
                        result += `<span class="hl-keyword">${escapeHtml(word)}</span>`;
                    } else if (COLORS.has(lower)) {
                        result += `<span class="hl-color">${escapeHtml(word)}</span>`;
                    } else if (MODIFIERS.has(lower)) {
                        result += `<span class="hl-modifier">${escapeHtml(word)}</span>`;
                    } else {
                        result += `<span class="hl-plain">${escapeHtml(word)}</span>`;
                    }
                    i += word.length;
                    continue;
                }
                // Other chars (parens, operators, etc.)
                result += `<span class="hl-plain">${escapeHtml(line[i])}</span>`;
                i++;
            }
            return result;
        }

        function updateHighlight() {
            const code = editor.value;
            const lines = code.split('\n');
            highlightCode.innerHTML = lines.map(highlightLine).join('\n') + '\n';
            // Sync scroll
            highlightLayer.scrollTop = editor.scrollTop;
            highlightLayer.scrollLeft = editor.scrollLeft;
        }

        // Load initial code
        editor.value = `{{INITIAL_CODE}}`;
        updateHighlight();

        // ===== AUTOCOMPLETE =====
        const acBox = document.getElementById('autocomplete');
        let acItems = [];
        let acIndex = -1;
        let acVisible = false;

        const SNIPPETS = [
            // Scenes & Settings
            { label: 'scene "..."', insert: 'scene ""', cursor: -1, tag: 'snippet' },
            { label: 'set background to ...', insert: 'set background to ', tag: 'snippet' },
            { label: 'set fps to 30', insert: 'set fps to 30', tag: 'snippet' },
            { label: 'set resolution to 1920x1080', insert: 'set resolution to 1920x1080', tag: 'snippet' },
            // Drawing
            { label: 'draw a circle at center with radius 100 color cyan', insert: 'draw a circle at center with radius 100 color cyan', tag: 'snippet' },
            { label: 'draw a square at center with size 100 color yellow', insert: 'draw a square at center with size 100 color yellow', tag: 'snippet' },
            { label: 'draw a triangle at center with size 100 color pink', insert: 'draw a triangle at center with size 100 color pink', tag: 'snippet' },
            { label: 'draw math "..." at center color cyan size 64', insert: 'draw math "" at center color cyan size 64', cursor: -27, tag: 'snippet' },
            { label: 'draw axes at center with size 400 color grey', insert: 'draw axes at center with size 400 color grey thickness 2', tag: 'snippet' },
            { label: 'draw a grid at center with size 400 color grey', insert: 'draw a grid at center with size 400 color grey thickness 1', tag: 'snippet' },
            { label: 'draw a wave at center with size 600 amplitude 80 frequency 3 color cyan', insert: 'draw a wave at center with size 600 amplitude 80 frequency 3 color cyan thickness 3', tag: 'snippet' },
            // Text
            { label: 'write "..." at top color white size 48 over 1 second', insert: 'write "" at top color white size 48 over 1 second', cursor: -40, tag: 'snippet' },
            // Animations
            { label: 'fade in ... over 1 second', insert: 'fade in the  over 1 second', cursor: -15, tag: 'snippet' },
            { label: 'fade out ... over 1 second', insert: 'fade out the  over 1 second', cursor: -15, tag: 'snippet' },
            { label: 'fade out everything over 1.5 seconds', insert: 'fade out everything over 1.5 seconds', tag: 'snippet' },
            { label: 'move ... to ... over 1 second', insert: 'move the  to center over 1 second', cursor: -24, tag: 'snippet' },
            { label: 'scale ... to 1.5 x over 1 second', insert: 'scale the  to 1.5 x over 1 second', cursor: -24, tag: 'snippet' },
            { label: 'rotate ... by 360 over 1 second', insert: 'rotate the  by 360 over 1 second', cursor: -22, tag: 'snippet' },
            { label: 'change color of ... to ... over 1 second', insert: 'change color of the  to cyan over 1 second', cursor: -25, tag: 'snippet' },
            { label: 'grow in ... over 1 second', insert: 'grow in the  over 1 second', cursor: -15, tag: 'snippet' },
            { label: 'spin in ... over 1.5 seconds', insert: 'spin in the  over 1.5 seconds', cursor: -17, tag: 'snippet' },
            { label: 'spiral in ... over 1.5 seconds', insert: 'spiral in the  over 1.5 seconds', cursor: -17, tag: 'snippet' },
            { label: 'indicate ... over 0.8 seconds', insert: 'indicate the  over 0.8 seconds', cursor: -18, tag: 'snippet' },
            { label: 'wiggle ... over 0.6 seconds', insert: 'wiggle the  over 0.6 seconds', cursor: -18, tag: 'snippet' },
            { label: 'circumscribe ... color yellow over 1 second', insert: 'circumscribe the  color yellow over 1 second', cursor: -28, tag: 'snippet' },
            // Morph / Camera / Particles
            { label: 'morph the ... into a ... over 2 seconds', insert: 'morph the  into a square over 2 seconds', cursor: -30, tag: 'snippet' },
            { label: 'zoom in to 2x over 1 second', insert: 'zoom in to 2x over 1 second', tag: 'snippet' },
            { label: 'zoom out to 1x over 1 second', insert: 'zoom out to 1x over 1 second', tag: 'snippet' },
            { label: 'pan to ... over 1 second', insert: 'pan to center over 1 second', tag: 'snippet' },
            { label: 'emit particles at center color cyan count 50 over 2 seconds', insert: 'emit particles at center color cyan count 50 over 2 seconds', tag: 'snippet' },
            // Timing
            { label: 'wait 1 second', insert: 'wait 1 second', tag: 'snippet' },
            { label: 'wait 0.5 seconds', insert: 'wait 0.5 seconds', tag: 'snippet' },
            { label: 'wait 2 seconds', insert: 'wait 2 seconds', tag: 'snippet' },
            // Plotting
            { label: 'plot "sin({x})" from -5 to 5 color cyan over 2 seconds', insert: 'plot "sin({x})" from -5 to 5 color cyan thickness 3 over 2 seconds', tag: 'snippet' },
            // Groups
            { label: 'group "..." { ... }', insert: 'group "" {\n    \n}', cursor: -7, tag: 'snippet' },
        ];

        // Build keyword entries from the existing sets
        const ALL_WORDS = [];
        KEYWORDS.forEach(w => ALL_WORDS.push({ label: w, insert: w, tag: 'keyword' }));
        COLORS.forEach(w => ALL_WORDS.push({ label: w, insert: w, tag: 'color' }));

        function getWordBeforeCursor() {
            const pos = editor.selectionStart;
            const text = editor.value;
            // Find start of current line
            let lineStart = text.lastIndexOf('\n', pos - 1) + 1;
            let lineText = text.slice(lineStart, pos);
            // Get the partial text on this line (for snippet matching)
            let wordMatch = lineText.match(/(\S+)$/);
            return { word: wordMatch ? wordMatch[1] : '', lineText: lineText.trimStart(), lineStart, pos };
        }

        function filterCompletions(input) {
            const lower = input.toLowerCase();
            if (!lower) return [];
            let results = [];
            // Match snippets by prefix of the label (check if any word in label starts with input)
            for (const s of SNIPPETS) {
                if (s.label.toLowerCase().startsWith(lower) ||
                    s.label.toLowerCase().includes(' ' + lower)) {
                    results.push(s);
                }
            }
            // Match individual keywords/colors
            for (const w of ALL_WORDS) {
                if (w.label.startsWith(lower) && w.label !== lower) {
                    results.push(w);
                }
            }
            return results.slice(0, 8);
        }

        function highlightMatch(label, input) {
            const lower = label.toLowerCase();
            const idx = lower.indexOf(input.toLowerCase());
            if (idx === -1) return escapeHtml(label);
            const before = label.slice(0, idx);
            const match = label.slice(idx, idx + input.length);
            const after = label.slice(idx + input.length);
            return escapeHtml(before) + '<span class="ac-match">' + escapeHtml(match) + '</span>' + escapeHtml(after);
        }

        function showAutocomplete() {
            const { word, lineText, lineStart, pos } = getWordBeforeCursor();
            // Use entire line content for snippet matching, individual word for keywords
            const matches = filterCompletions(lineText || word);
            if (matches.length === 0) {
                hideAutocomplete();
                return;
            }

            acItems = matches;
            acIndex = 0;
            acBox.innerHTML = matches.map((m, i) =>
                `<div class="ac-item${i === 0 ? ' selected' : ''}" data-index="${i}">` +
                `<span class="ac-label">${highlightMatch(m.label, lineText || word)}</span>` +
                `<span class="ac-tag ${m.tag}">${m.tag}</span></div>`
            ).join('') + '<div class="ac-hint">Tab or Enter to insert · Esc to dismiss</div>';

            // Position the dropdown
            positionAutocomplete();
            acBox.classList.add('visible');
            acVisible = true;

            // Click handlers
            acBox.querySelectorAll('.ac-item').forEach(el => {
                el.addEventListener('mousedown', (e) => {
                    e.preventDefault();
                    acIndex = parseInt(el.dataset.index);
                    acceptCompletion();
                });
            });
        }

        function positionAutocomplete() {
            // Approximate position based on cursor
            const text = editor.value.slice(0, editor.selectionStart);
            const lines = text.split('\n');
            const lineNum = lines.length;
            const lineHeight = 14 * 1.7; // font-size * line-height
            const top = (lineNum * lineHeight) + 20 - editor.scrollTop;
            const charWidth = 8.4; // approx monospace char width at 14px
            const left = Math.min(lines[lines.length - 1].length * charWidth + 20, 400);
            acBox.style.top = Math.min(top, editor.offsetHeight - 240) + 'px';
            acBox.style.left = left + 'px';
        }

        function hideAutocomplete() {
            acBox.classList.remove('visible');
            acVisible = false;
            acItems = [];
            acIndex = -1;
        }

        function acceptCompletion() {
            if (acIndex < 0 || acIndex >= acItems.length) return;
            const item = acItems[acIndex];
            const pos = editor.selectionStart;
            const text = editor.value;
            // Find start of current line
            let lineStart = text.lastIndexOf('\n', pos - 1) + 1;

            if (item.tag === 'snippet') {
                // Replace entire current line content
                const before = text.slice(0, lineStart);
                const after = text.slice(pos);
                // Preserve leading whitespace
                const currentLine = text.slice(lineStart, pos);
                const indent = currentLine.match(/^(\s*)/)[1];
                const newText = indent + item.insert;
                editor.value = before + newText + after;
                const newPos = lineStart + newText.length + (item.cursor || 0);
                editor.selectionStart = editor.selectionEnd = newPos;
            } else {
                // Replace just the current word
                const beforeLine = text.slice(0, pos);
                const wordMatch = beforeLine.match(/(\S+)$/);
                const wordStart = wordMatch ? pos - wordMatch[1].length : pos;
                const before = text.slice(0, wordStart);
                const after = text.slice(pos);
                editor.value = before + item.insert + after;
                const newPos = wordStart + item.insert.length;
                editor.selectionStart = editor.selectionEnd = newPos;
            }

            hideAutocomplete();
            updateHighlight();
        }

        // Keyboard shortcuts
        editor.addEventListener('keydown', (e) => {
            if (acVisible) {
                if (e.key === 'ArrowDown') {
                    e.preventDefault();
                    acIndex = (acIndex + 1) % acItems.length;
                    updateAcSelection();
                    return;
                }
                if (e.key === 'ArrowUp') {
                    e.preventDefault();
                    acIndex = (acIndex - 1 + acItems.length) % acItems.length;
                    updateAcSelection();
                    return;
                }
                if (e.key === 'Tab' || e.key === 'Enter') {
                    e.preventDefault();
                    acceptCompletion();
                    return;
                }
                if (e.key === 'Escape') {
                    e.preventDefault();
                    hideAutocomplete();
                    return;
                }
            }
        });

        function updateAcSelection() {
            acBox.querySelectorAll('.ac-item').forEach((el, i) => {
                el.classList.toggle('selected', i === acIndex);
            });
            // Scroll selected into view
            const selected = acBox.querySelector('.ac-item.selected');
            if (selected) selected.scrollIntoView({ block: 'nearest' });
        }

        document.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                e.preventDefault();
                renderPreview();
            }
            if (e.key === ' ' && document.activeElement !== editor) {
                e.preventDefault();
                togglePlay();
            }
        });

        // Update highlight + autocomplete on input, sync scroll
        editor.addEventListener('input', () => {
            updateHighlight();
            showAutocomplete();
            clearTimeout(renderTimeout);
            renderTimeout = setTimeout(() => {
                renderPreview();
            }, 1500);
        });
        editor.addEventListener('scroll', () => {
            highlightLayer.scrollTop = editor.scrollTop;
            highlightLayer.scrollLeft = editor.scrollLeft;
        });
        // Hide autocomplete when clicking outside editor
        document.addEventListener('click', (e) => {
            if (!editor.contains(e.target) && !acBox.contains(e.target)) {
                hideAutocomplete();
            }
        });

        async function renderPreview() {
            const code = editor.value;
            if (!code.trim()) return;

            setStatus('rendering', 'Rendering...');
            loader.classList.add('active');
            stopPlay();

            try {
                const response = await fetch('/render', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ code })
                });

                const data = await response.json();

                if (data.error) {
                    showError(data.error);
                    setStatus('error', 'Error');
                    loader.classList.remove('active');
                    return;
                }

                frames = data.frames || [];
                totalFrames = data.totalFrames || frames.length;
                fps = data.fps || 15;

                document.getElementById('stat-frames').textContent = totalFrames;
                document.getElementById('stat-duration').textContent = (data.duration || 0).toFixed(1) + 's';
                document.getElementById('stat-scenes').textContent = data.scenes || 0;

                timeline.max = frames.length - 1;
                timeline.value = 0;
                currentFrame = 0;

                if (frames.length > 0) {
                    showFrame(0);
                    placeholder.style.display = 'none';
                    canvas.style.display = 'block';
                }

                setStatus('ok', `Rendered ${totalFrames} frames`);
            } catch (err) {
                showError('Failed to connect to server: ' + err.message);
                setStatus('error', 'Connection error');
            }

            loader.classList.remove('active');
        }

        function showFrame(idx) {
            if (idx >= 0 && idx < frames.length) {
                canvas.src = 'data:image/png;base64,' + frames[idx];
                currentFrame = idx;
                timeline.value = idx;
                updateTimeDisplay();
            }
        }

        function seekFrame(idx) {
            showFrame(parseInt(idx));
        }

        function togglePlay() {
            if (isPlaying) {
                stopPlay();
            } else {
                startPlay();
            }
        }

        function startPlay() {
            if (frames.length === 0) return;
            isPlaying = true;
            playBtn.textContent = '⏸';
            playBtn.classList.add('active');

            const interval = 1000 / fps;
            playInterval = setInterval(() => {
                currentFrame++;
                if (currentFrame >= frames.length) {
                    currentFrame = 0;
                }
                showFrame(currentFrame);
            }, interval);
        }

        function stopPlay() {
            isPlaying = false;
            playBtn.textContent = '▶';
            playBtn.classList.remove('active');
            if (playInterval) {
                clearInterval(playInterval);
                playInterval = null;
            }
        }

        function firstFrame() { stopPlay(); showFrame(0); }
        function lastFrame() { stopPlay(); showFrame(frames.length - 1); }

        function updateTimeDisplay() {
            const current = currentFrame / fps;
            const total = frames.length / fps;
            timeDisplay.textContent = `${formatTime(current)} / ${formatTime(total)}`;
        }

        function formatTime(seconds) {
            const min = Math.floor(seconds / 60);
            const sec = (seconds % 60).toFixed(1);
            return `${min}:${sec.padStart(4, '0')}`;
        }

        function setStatus(type, text) {
            const dot = document.getElementById('status-dot');
            const statusText = document.getElementById('status-text');
            dot.className = 'status-dot';
            if (type === 'error') dot.classList.add('error');
            if (type === 'rendering') dot.classList.add('rendering');
            statusText.textContent = text;
        }

        function showError(msg) {
            const toast = document.getElementById('error-toast');
            toast.textContent = '❌ ' + msg;
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 5000);
        }

        async function downloadMP4() {
            const code = editor.value;
            if (!code.trim()) return;

            const btn = document.getElementById('download-btn');
            const origText = btn.textContent;
            btn.disabled = true;
            btn.textContent = '⏳ Exporting...';
            setStatus('rendering', 'Exporting full-quality MP4...');

            try {
                const response = await fetch('/export', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ code })
                });

                const contentType = response.headers.get('Content-Type') || '';
                if (contentType.includes('application/json')) {
                    const data = await response.json();
                    showError(data.error || 'Export failed');
                    setStatus('error', 'Export failed');
                } else {
                    const blob = await response.blob();
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = 'slang_animation.mp4';
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                    setStatus('ok', 'MP4 downloaded!');
                }
            } catch (err) {
                showError('Export failed: ' + err.message);
                setStatus('error', 'Export error');
            }

            btn.disabled = false;
            btn.textContent = origText;
        }
